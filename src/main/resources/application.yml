server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/systemblog
    username: root
    password: password
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    org.springframework.boot.autoconfigure: ERROR

app:
  jwt-secret: JWTSecretKey
  jwt-expiration-milliseconds: 604800000
